<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Book icon -->
  <!-- Left page -->
  <path d="M4 8 C4 8 5 7 20 7 L20 40 C5 40 4 41 4 41 Z" fill="rgba(245,241,232,0.12)" stroke="#f5f1e8" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Right page -->
  <path d="M36 8 C36 8 35 7 20 7 L20 40 C35 40 36 41 36 41 Z" fill="rgba(245,241,232,0.07)" stroke="#f5f1e8" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Spine highlight -->
  <line x1="20" y1="7" x2="20" y2="40" stroke="#c8a951" stroke-width="1.8"/>
  <!-- Page lines left -->
  <line x1="8"  y1="16" x2="18" y2="15" stroke="#f5f1e8" stroke-width=".8" stroke-opacity=".35"/>
  <line x1="8"  y1="21" x2="18" y2="20" stroke="#f5f1e8" stroke-width=".8" stroke-opacity=".35"/>
  <line x1="8"  y1="26" x2="18" y2="25" stroke="#f5f1e8" stroke-width=".8" stroke-opacity=".35"/>
  <!-- Page lines right -->
  <line x1="22" y1="15" x2="32" y2="16" stroke="#f5f1e8" stroke-width=".8" stroke-opacity=".2"/>
  <line x1="22" y1="20" x2="32" y2="21" stroke="#f5f1e8" stroke-width=".8" stroke-opacity=".2"/>
  <line x1="22" y1="25" x2="32" y2="26" stroke="#f5f1e8" stroke-width=".8" stroke-opacity=".2"/>

  <!-- Quill feather — diagonal across the book -->
  <!-- Feather spine -->
  <line x1="32" y1="2" x2="16" y2="44" stroke="#c8a951" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Feather left barbs -->
  <path d="M32 2 C26 6 22 12 20 18 C22 16 28 10 32 2 Z" fill="#e7cd86" fill-opacity=".85"/>
  <path d="M30 8 C25 13 21 19 20 25 C22 22 27 16 30 8 Z" fill="#e7cd86" fill-opacity=".65"/>
  <path d="M27 16 C23 20 20 26 19 31 C21 28 25 22 27 16 Z" fill="#e7cd86" fill-opacity=".5"/>
  <!-- Feather right barbs -->
  <path d="M32 2 C34 8 33 16 28 22 C29 18 33 10 32 2 Z" fill="#f5f1e8" fill-opacity=".55"/>
  <path d="M30 8 C32 14 31 20 27 27 C28 23 32 16 30 8 Z" fill="#f5f1e8" fill-opacity=".4"/>
  <!-- Quill nib -->
  <path d="M16 44 L14 48 L18 43 Z" fill="#c8a951"/>

  <!-- Divider -->
  <line x1="45" y1="10" x2="45" y2="38" stroke="#c8a951" stroke-width="1" stroke-opacity=".4"/>

  <!-- ADP text -->
  <text x="54" y="35" font-family="'Archivo Black','Impact','Arial Black',sans-serif" font-weight="900" font-size="28" letter-spacing=".15em" fill="#f5f1e8">ADP</text>
</svg>
